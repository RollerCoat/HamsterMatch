<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HamsterMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="top_nav_container">
            <nav id="top_nav">
                <h1>HamsterMatch</h1>
                <p>Chats</p>
                <p>Über uns</p>
                <p>Profil</p>
                <p>Einstellungen</p>
            </nav>
    </header>

    <main id="main">
        <div id="card">
            <div>
                <img src="assets/profile_pic.png" id="card_profile_picture">
                <p id="text_card_info">
                    <span id="name">Herbert</span>,
                    <span id="age">2 Jahre</span>
                </p>

                <p id="like_dislike_card_info">
                    <p>
                        Ich mag: <span id="name">Nüsse</span>,
                    </p>
                    <p>
                        Ich mag nicht: <span id="age">Sonnenblumenkerne</span>
                    </p>
                </p>

                <div id="match_button_container">
                    <div id="match_buttons">
                        <p>Like</p>
                        <p>Super-Like</p>
                        <p>Dislike</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
